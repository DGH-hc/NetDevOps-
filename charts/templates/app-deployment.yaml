apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netdevops.fullname" . }}-api
  labels:
    app.kubernetes.io/name: {{ include "netdevops.name" . }}
    app.kubernetes.io/component: api

spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.api.replicas }}
  {{- end }}

  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "netdevops.name" . }}
      app.kubernetes.io/component: api

  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "netdevops.name" . }}
        app.kubernetes.io/component: api
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "netdevops-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/app/config"
        vault.hashicorp.com/agent-inject-template-config: |
          {{`{{- with secret "secret/data/app/config" -}}
          POSTGRES_USER={{ .Data.data.POSTGRES_USER }}
          POSTGRES_PASSWORD={{ .Data.data.POSTGRES_PASSWORD }}
          POSTGRES_DB={{ .Data.data.POSTGRES_DB }}
          {{- end -}}`}}
        vault.hashicorp.com/agent-inject-file-config: "config"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/vault-addr: "http://vault-internal.vault.svc:8200"

    spec:
      serviceAccountName: netdevops-api

      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          command:
            - /bin/sh
            - -c
          args:
            - |
              if [ ! -f /vault/secrets/config ]; then
                echo "Vault secrets missing"; exit 1
              fi
              . /vault/secrets/config
              export DATABASE_URL="postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@netdevops-postgres.app.svc.cluster.local:5432/$POSTGRES_DB"
              exec uvicorn app.main:app --host 0.0.0.0 --port 8000

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}