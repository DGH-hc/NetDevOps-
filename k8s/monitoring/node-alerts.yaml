apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: node-alerts
  namespace: monitoring
  labels:
    release: monitoring

spec:
  groups:
    - name: node-alerts

      rules:

        - alert: NodeDown
          expr: up == 0
          for: 1m

          labels:
            severity: critical

          annotations:
            summary: "Node is down"
            description: "A monitored node has stopped responding for more than 1 minute."

        - alert: HighCPUUsage
          expr: |
            100 - (
              avg by(instance)(
                rate(node_cpu_seconds_total{mode="idle"}[5m])
              ) * 100
            ) > 85

          for: 2m

          labels:
            severity: warning

          annotations:
            summary: "High CPU usage"
            description: "CPU usage exceeded 85%."

        - alert: HighMemoryUsage
          expr: |
            (
              1 -
              (
                node_memory_MemAvailable_bytes
                /
                node_memory_MemTotal_bytes
              )
            ) * 100 > 90

          for: 2m

          labels:
            severity: warning

          annotations:
            summary: "High memory usage"
            description: "Memory usage exceeded 90%."

        - alert: DiskUsageCritical
          expr: |
            100 - (
              (
                node_filesystem_avail_bytes{
                  mountpoint="/var",
                  fstype="ext4"
                }
                /
                node_filesystem_size_bytes{
                  mountpoint="/var",
                  fstype="ext4"
                }
              ) * 100
            ) > 85

          for: 5m

          labels:
            severity: critical

          annotations:
            summary: "Disk usage critical"
            description: "Disk usage exceeded 85%."