apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: kubernetes-alerts
  namespace: monitoring
  labels:
    release: monitoring

spec:
  groups:
    - name: kubernetes.rules
      rules:

        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[5m]) > 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Pod restarting frequently"
            description: "Pod restart rate exceeded threshold."

        - alert: PodNotReady
          expr: kube_pod_status_ready{condition="true"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod not ready"
            description: "A pod has remained unready for more than 5 minutes."

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas
            !=
            kube_deployment_status_available_replicas
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Deployment replica mismatch"
            description: "Deployment replicas unavailable."

        - alert: PodHighRestartRate
          expr: increase(kube_pod_container_status_restarts_total[10m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High pod restart rate"
            description: "Pod restarted more than 3 times in 10 minutes."

        - alert: KubernetesNodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Kubernetes node not ready"
            description: "A Kubernetes node entered NotReady state."