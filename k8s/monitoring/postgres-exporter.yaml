apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres-exporter

  template:
    metadata:
      labels:
        app: postgres-exporter

    spec:
      containers:
        - name: postgres-exporter

          image: prometheuscommunity/postgres-exporter:latest

          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://netdevops:rotatedpassword123@postgres:5432/netdevops?sslmode=disable"

          ports:
            - containerPort: 9187

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: app


  labels:
    app: postgres-exporter

spec:
  selector:
    app: postgres-exporter

  ports:
    - name: metrics
      port: 9187
      targetPort: 9187

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-exporter
  namespace: monitoring

  labels:
    release: monitoring

spec:
  selector:
    matchLabels:
      app: postgres-exporter

  namespaceSelector:
    matchNames:
      - app

  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s