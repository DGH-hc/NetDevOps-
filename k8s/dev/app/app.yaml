apiVersion: apps/v1
kind: Deployment
metadata:
  name: netdevops-app
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netdevops-app
  template:
    metadata:
      labels:
        app: netdevops-app
    spec:
      containers:
        - name: app
          image: corporatecatalyst/netdevops-app:latest 
          ports:
            - containerPort: 8000

          env:
            - name: DB_HOST
              value: postgres.app.svc.cluster.local
            - name: DB_USER
              value: netdevops
            - name: DB_PASSWORD
              value: rotatedpassword123

            - name: REDIS_HOST
              value: redis.app.svc.cluster.local

            - name: DATABASE_URL
              value: postgresql://netdevops:rotatedpassword123@postgres:5432/netdevops 

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /health/ready 
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: netdevops-app
  namespace: app
spec:
  selector:
    app: netdevops-app
  ports:
    - port: 80
      targetPort: 8000
